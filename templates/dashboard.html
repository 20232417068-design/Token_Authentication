<!DOCTYPE html>
<html>
<head>
    <title>Voting Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 340px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .vote-btn { background: #43cea2; color: white; }
        .vote-btn:hover { background: #38b893; }

        .logout { background: red; color: white; }
        .logout:hover { background: darkred; }

        #msg { margin-top: 10px; font-weight: bold; }

        #result {
            margin-top: 15px;
            text-align: left;
        }

        canvas {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 id="welcome">Loading...</h2>

    <h3>Vote for your candidate</h3>

    <button id="btnA" class="vote-btn" onclick="vote('A')">Vote Candidate A</button>
    <button id="btnB" class="vote-btn" onclick="vote('B')">Vote Candidate B</button>
    <button id="btnC" class="vote-btn" onclick="vote('C')">Vote Candidate C</button>
    <button id="btnD" class="vote-btn" onclick="vote('D')">Vote Candidate D</button>

    <p id="msg"></p>

    <button onclick="getResults()">📊 View Results</button>

    <div id="result"></div>

    <canvas id="chart"></canvas>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const BASE_URL = "https://token-authentication-hq1t.onrender.com";
const token = localStorage.getItem("token");

// 🚫 Redirect if not logged in
if (!token) {
    alert("Please login first");
    window.location.href = "/";
}

// ✅ Load user info
fetch(BASE_URL + "/dashboard", {
    headers: { "Authorization": "Bearer " + token }
})
.then(res => {
    if (!res.ok) throw new Error("Dashboard failed");
    return res.json();
})
.then(data => {
    document.getElementById("welcome").innerText = data.message;

    if (data.has_voted) {
        document.getElementById("msg").innerText =
            "✅ You voted for Candidate " + data.vote;

        disableButtons();
    }
})
.catch(err => {
    console.log(err);
    document.getElementById("welcome").innerText = "❌ Failed to load";
});

// 🗳️ Vote
function vote(candidate) {
    document.getElementById("msg").innerText = "Processing...";

    fetch(BASE_URL + "/vote", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ candidate })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg").innerText = data.message;

        if (data.message.includes("Vote") || data.message.includes("already")) {
            disableButtons();
        }
    })
    .catch(() => {
        document.getElementById("msg").innerText = "Server error";
    });
}

// 🔒 Disable buttons
function disableButtons() {
    document.querySelectorAll(".vote-btn").forEach(btn => {
        btn.disabled = true;
    });
}


    fetch(BASE_URL + "/results")
    .then(res => res.json())
    .then(data => {

        let html = `
            <h3>Total Votes: ${data.total}</h3>
            <div style="margin-top:10px;">
        `;

        for (let key in data.votes) {
            html += `
                <div style="
                    background:#f5f5f5;
                    padding:10px;
                    margin:8px 0;
                    border-radius:6px;
                ">
                    <b>Candidate ${key}</b><br>
                    Votes: ${data.votes[key]}<br>
                    Percentage: ${data.percentage[key]}%
                </div>
            `;
        }

        html += "</div>";

        // 🏆 Winner
        if (data.winner) {
            html += `
                <div style="
                    margin-top:15px;
                    padding:10px;
                    background:#ffd700;
                    border-radius:6px;
                    font-weight:bold;
                ">
                    🏆 Winner: Candidate ${data.winner}
                </div>
            `;
        }

        document.getElementById("result").innerHTML = html;

        // 📊 Chart
        const ctx = document.getElementById("chart");

        // destroy old chart
        if (window.myChart) {
            window.myChart.destroy();
        }

        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["A", "B", "C", "D"],
                datasets: [{
                    label: 'Votes',
                    data: [
                        data.votes.A,
                        data.votes.B,
                        data.votes.C,
                        data.votes.D
                    ]
                }]
            }
        });

    })
    .catch(() => {
        document.getElementById("result").innerText = "Error loading results";
    });
fetch(BASE_URL + "/results")
.then(res => {
    console.log("STATUS:", res.status);   // 🔥 debug
    return res.json();
})
.then(data => {
    console.log("DATA:", data);  // 🔥 debug

    if (data.error) {
        document.getElementById("result").innerText = data.error;
        return;
    }

    let html = `<h3>Total Votes: ${data.total}</h3>`;

    for (let key in data.votes) {
        html += `<p>${key}: ${data.votes[key]}</p>`;
    }

    if (data.winner) {
        html += `<h3>🏆 Winner: ${data.winner}</h3>`;
    }

    document.getElementById("result").innerHTML = html;
})
.catch(err => {
    console.log("ERROR:", err);  // 🔥 IMPORTANT
});
// 🔓 Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}
</script>

</body>
</html>
