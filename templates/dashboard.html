<!DOCTYPE html>
<html>
<head>
    <title>Voting Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #2ecc71;
            color: white;
        }

        .result-box {
            background: #f1f1f1;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            text-align: left;
        }

        .winner {
            background: gold;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
        }

        .logout {
            background: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 id="welcome">Loading...</h2>
    <p>Vote for your candidate</p>

    <button onclick="vote('A')" class="vote-btn">Vote Candidate A</button>
    <button onclick="vote('B')" class="vote-btn">Vote Candidate B</button>
    <button onclick="vote('C')" class="vote-btn">Vote Candidate C</button>
    <button onclick="vote('D')" class="vote-btn">Vote Candidate D</button>

    <p id="msg"></p>

    <button onclick="getResults()">📊 View Results</button>

    <div id="result"></div>

    <canvas id="chart"></canvas>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const BASE_URL = "http://127.0.0.1:5000"; // ✅ change to Render URL when deploying
const token = localStorage.getItem("token");

// 🚫 redirect if not logged in
if (!token) {
    alert("Please login first");
    window.location.href = "/";
}

// ✅ Load user info
fetch(BASE_URL + "/dashboard", {
    headers: { "Authorization": "Bearer " + token }
})
.then(res => res.json())
.then(data => {
    document.getElementById("welcome").innerText = data.message;

    if (data.has_voted) {
        document.getElementById("msg").innerText =
            "✅ You voted for Candidate " + data.vote;
        disableButtons();
    }
});

// 🗳️ Vote
function vote(candidate) {
    document.getElementById("msg").innerText = "Processing...";

    fetch(BASE_URL + "/vote", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ candidate })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg").innerText = data.message;
        disableButtons();
    });
}

// 🔒 disable buttons
function disableButtons() {
    document.querySelectorAll(".vote-btn").forEach(btn => {
        btn.disabled = true;
    });
}

// 📊 Results
function getResults() {

    fetch(BASE_URL + "/results")
    .then(res => res.json())
    .then(data => {

        let html = `<h3>Total Votes: ${data.total}</h3>`;

        for (let key in data.votes) {
            html += `
                <div class="result-box">
                    <b>Candidate ${key}</b><br>
                    Votes: ${data.votes[key]}<br>
                    Percentage: ${data.percentage[key]}%
                </div>
            `;
        }

        // 🏆 Winner
        if (data.winner) {
            html += `
                <div class="winner">
                    🏆 Winner: Candidate ${data.winner}
                </div>
            `;
        }

        document.getElementById("result").innerHTML = html;

        // 📊 Chart
        const ctx = document.getElementById("chart");

        if (window.chart) {
            window.chart.destroy();
        }

        window.chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["A","B","C","D"],
                datasets: [{
                    label: 'Votes',
                    data: [
                        data.votes.A,
                        data.votes.B,
                        data.votes.C,
                        data.votes.D
                    ]
                }]
            }
        });

    });
}

// 🔓 Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

</script>

</body>
</html>
