<!DOCTYPE html>
<html>
<head>
    <title>Voting Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #2ecc71;
            color: white;
        }

        .result-box {
            background: #f1f1f1;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            text-align: left;
        }

        .winner {
            background: gold;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
        }

        .logout {
            background: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 id="welcome">Loading...</h2>
    <p>Vote for your candidate</p>

    <button onclick="vote('A')" class="vote-btn">Vote Candidate A</button>
    <button onclick="vote('B')" class="vote-btn">Vote Candidate B</button>
    <button onclick="vote('C')" class="vote-btn">Vote Candidate C</button>
    <button onclick="vote('D')" class="vote-btn">Vote Candidate D</button>

    <p id="msg"></p>

    <button onclick="getResults()">📊 View Results</button>

    <div id="result"></div>

    <canvas id="chart"></canvas>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const BASE_URL = "http://127.0.0.1:5000";
const token = localStorage.getItem("token");

// Redirect if not logged in
if (!token) {
    alert("Please login first");
    window.location.href = "/";
}

// Load user
fetch(BASE_URL + "/dashboard", {
    headers: { "Authorization": "Bearer " + token }
})
.then(res => res.json())
.then(data => {
   console.log("Dashboard Data:", data); // DEBUG
    document.getElementById("welcome").innerText =
        "Welcome " + data.username;

        // ✅ remove loading text
    document.getElementById("msg").innerText = "";

    if (data.has_voted) {
        document.getElementById("msg").innerText =
            "✅ You voted for Candidate " + data.vote;

        disableButtons();
    }
})
    .catch(err => {
    console.log(err);
    document.getElementById("welcome").innerText = "Error loading user";
});
 

// Vote
function vote(candidate) {

    document.getElementById("msg").innerText = "Processing...";

    fetch(BASE_URL + "/vote", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ candidate })
    })
    .then(res => res.json())
    .then(data => {
         console.log("Vote Response:", data); 

        document.getElementById("msg").innerText =
            "✅ Vote submitted successfully for " + candidate;

        disableButtons();
        })
    .catch(err => {
        console.log(err);
        document.getElementById("msg").innerText =
            "❌ Vote failed";
    });
}

// Disable buttons
function disableButtons() {
    document.querySelectorAll(".vote-btn").forEach(btn => {
        btn.disabled = true;
    });
}
function getResults() {
    fetch(BASE_URL + "/results")
    .then(res => res.json())
    .then(data => {

        let html = `<h3>Total Votes: ${data.total}</h3>`;

        for (let key in data.votes) {
            html += `
                <div style="background:#f5f5f5; padding:10px; margin:8px 0; border-radius:6px;">
                    <b>Candidate ${key}</b><br>
                    Votes: ${data.votes[key]}<br>
                    Percentage: ${data.percentage[key]}%
                </div>
            `;
        }

        // 🏆 Winner
        if (data.winner) {
            html += `
                <div style="margin-top:15px; padding:10px; background:#ffd700; border-radius:6px; font-weight:bold;">
                    🏆 Winner: Candidate ${data.winner}
                </div>
            `;
        }

        document.getElementById("result").innerHTML = html;

    })
    .catch((err) => {
        console.log(err);
        document.getElementById("result").innerText = "Error loading results";
    });
}

// Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

</script>

</body>
</html>
